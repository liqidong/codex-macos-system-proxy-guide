# Use this format when your client expects a plain rules list.
# Replace YOUR_PROXY_GROUP_NAME with a real proxy group from your config.

rules:
  - DOMAIN-SUFFIX,claude.ai,YOUR_PROXY_GROUP_NAME
  - DOMAIN-SUFFIX,claude.com,YOUR_PROXY_GROUP_NAME
  - DOMAIN-SUFFIX,anthropic.com,YOUR_PROXY_GROUP_NAME
  - DOMAIN-SUFFIX,claudeusercontent.com,YOUR_PROXY_GROUP_NAME
  - DOMAIN-SUFFIX,clau.de,YOUR_PROXY_GROUP_NAME
